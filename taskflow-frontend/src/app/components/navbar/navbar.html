<mat-toolbar>
  <span> TaskFlow </span>

  <span class="spacer"> </span>

  <a mat-button routerLink="/tasks" *ngIf="isLoggedIn$ | async"> Tasks </a>

  <a mat-button routerLink="/login" *ngIf="!(isLoggedIn$ | async)"> Login </a>

</mat-toolbar>
