<h2>Tasks</h2>

<p *ngIf="isLoading">Loading...</p>
<p *ngIf="errorMessage">{{ errorMessage }}</p>

<mat-form-field>
  <mat-label> Search </mat-label>
  <input matInput [(ngModel)]="searchTerm" />
</mat-form-field>

<div class="task-container">
  <mat-card class="task-card" *ngFor="let task of paginatedTasks()">
    <mat-card-title>
      <div *ngIf="editingTaskId !== task.id">
        {{ task.title }}
      </div>

      <div *ngIf="editingTaskId === task.id">
        <input #editedTitle [value]="task.title" />

        <button mat-button (click)="saveEdit(task, editedTitle.value)">Save</button>
      </div>
    </mat-card-title>

    <mat-card-content>
      <p>{{ task.description }}</p>

      <p>
        Status:
        {{ task.isCompleted ? 'Completed' : 'Pending' }}
      </p>

      <p>
        Category:
        {{ task.category?.name || 'No Category' }}
      </p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button (click)="deleteTask(task.id)">Delete</button>

      <button mat-button (click)="startEdit(task.id)">Edit</button>
    </mat-card-actions>
  </mat-card>
</div>

<button type="button" (click)="previousPage()" [disabled]="currentPage === 1">Previous</button>

<span> Page {{ currentPage }} of {{ totalPages }} </span>

<button type="button" (click)="nextPage()" [disabled]="currentPage === totalPages">Next</button>

<p *ngIf="paginatedTasks().length === 0">No tasks found on this page</p>
